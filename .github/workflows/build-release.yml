name: Build, Test, Sign, and Release S.A.K. Utility

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  QT_VERSION: '6.10.3'
  BUILD_TYPE: Release
  Qt6_DIR: ''  # Populated by install-qt-action at runtime
  VCPKG_ROOT: C:/vcpkg

jobs:
  build-windows:
    name: Build, verify, package, and publish Windows release
    runs-on: windows-latest
    permissions:
      contents: write
      id-token: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Read version
      id: version
      shell: pwsh
      run: |
        $ver = (Get-Content VERSION -Raw).Trim()
        Write-Host "Detected version: $ver"
        "APP_VERSION=$ver" | Out-File -Append $env:GITHUB_ENV
        "version=$ver" | Out-File -Append $env:GITHUB_OUTPUT

    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: ${{ env.QT_VERSION }}
        host: 'windows'
        target: 'desktop'
        arch: 'win64_msvc2022_64'
        cache: true

    - name: Setup MSVC
      uses: microsoft/setup-msbuild@v3
      with:
        vs-version: '17'

    - name: Setup Python for MCP bundles
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Cache vcpkg
      uses: actions/cache@v5
      with:
        path: |
          ${{ env.VCPKG_ROOT }}/installed
          ${{ env.VCPKG_ROOT }}/packages
          ${{ env.VCPKG_ROOT }}/buildtrees
        key: ${{ runner.os }}-vcpkg-${{ hashFiles('**/CMakeLists.txt') }}
        restore-keys: |
          ${{ runner.os }}-vcpkg-

    - name: Install vcpkg dependencies
      run: |
        vcpkg install zlib:x64-windows bzip2:x64-windows liblzma:x64-windows
        vcpkg integrate install

    - name: Bundle smartmontools
      shell: pwsh
      run: |
        # Download and extract smartctl.exe for SMART disk diagnostics.
        # The script is idempotent - skips if smartctl.exe is already present
        # (e.g. checked into the repo via the .gitignore exception).
        & scripts/bundle_smartmontools.ps1

    - name: Cache UUP tools
      uses: actions/cache@v5
      with:
        path: tools/uup/uupmc
        key: ${{ runner.os }}-uupmc-${{ hashFiles('scripts/bundle_uup_tools.ps1') }}

    - name: Bundle UUP tools (aria2c + verify uupmc)
      shell: pwsh
      run: |
        # Download aria2c.exe and verify patched UUPMediaConverter is present.
        # UUPMediaConverter binaries are checked into the repo (patched build).
        & scripts/bundle_uup_tools.ps1

    - name: Bundle iPerf3
      shell: pwsh
      run: |
        # Download iperf3.exe and cygwin1.dll for LAN bandwidth testing.
        # The script is idempotent - skips if iperf3.exe is already present.
        & scripts/bundle_iperf3.ps1

    - name: Bundle MCP servers
      shell: pwsh
      run: |
        # Build portable MCP servers before CMake config so the app output and
        # packaged ZIP get the same bundled tools layout as local releases.
        & scripts/bundle_mcp_servers.ps1 -BuildWin32 -Python python

    - name: Install release gate tools
      shell: pwsh
      run: |
        choco install ripgrep -y --no-progress
        python -m pip install --disable-pip-version-check lizard==1.21.2
        rg --version
        lizard --version

    - name: Verify Qt resource manifests
      shell: pwsh
      run: |
        & scripts/check_qrc_resources.ps1

    - name: Scan for committed secrets
      shell: pwsh
      run: |
        & scripts/scan_secrets.ps1 -SkipExternalTools

    - name: Check third-party licenses
      shell: pwsh
      run: |
        & scripts/check_third_party_licenses.ps1

    - name: Check blocking patterns
      shell: pwsh
      run: |
        & scripts/check_blocking_patterns.ps1

    - name: Configure CMake
      run: |
        cmake -B build -G "Visual Studio 17 2022" -A x64 `
          -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} `
          -DCMAKE_PREFIX_PATH="${{ env.Qt6_DIR }}" `
          -DVCPKG_APPLOCAL_DEPS=OFF `
          -DCMAKE_TOOLCHAIN_FILE="${{ env.VCPKG_ROOT }}/scripts/buildsystems/vcpkg.cmake"

    - name: Build
      run: cmake --build build --config ${{ env.BUILD_TYPE }} --parallel

    - name: Bundle vcpkg runtime DLLs
      working-directory: build/Release
      shell: pwsh
      run: |
        & ../../scripts/bundle_vcpkg_runtime.ps1 -DestinationPath .

    - name: Verify build output
      working-directory: build/Release
      shell: pwsh
      run: |
        Write-Host "=== Build Output Verification ==="

        # Executable must exist
        if (!(Test-Path "sak_utility.exe")) {
          Write-Error "FATAL: sak_utility.exe not found"
          exit 1
        }
        Write-Host "OK  sak_utility.exe"

        # Splash screen must exist (copied by CMake POST_BUILD)
        if (!(Test-Path "sak_splash.png")) {
          Write-Error "FATAL: sak_splash.png not found - CMake POST_BUILD copy failed"
          exit 1
        }
        Write-Host "OK  sak_splash.png"

        # Icon must exist
        if (!(Test-Path "icon.ico")) {
          Write-Warning "icon.ico not found (non-fatal, embedded in exe via .rc)"
        } else {
          Write-Host "OK  icon.ico"
        }

        # Qt plugin directories (deployed by windeployqt POST_BUILD)
        $requiredDirs = @("platforms", "styles", "imageformats", "iconengines", "tls")
        foreach ($dir in $requiredDirs) {
          if (!(Test-Path $dir)) {
            Write-Error "FATAL: Qt plugin directory '$dir' not found - windeployqt may have failed"
            exit 1
          }
          $count = (Get-ChildItem $dir -Filter "*.dll" | Measure-Object).Count
          Write-Host "OK  $dir/ ($count plugins)"
        }

        # Qt DLLs
        $requiredDlls = @("Qt6Core.dll", "Qt6Gui.dll", "Qt6Widgets.dll", "Qt6Network.dll", "Qt6Concurrent.dll", "Qt6Xml.dll")
        foreach ($dll in $requiredDlls) {
          if (!(Test-Path $dll)) {
            Write-Error "FATAL: $dll not found"
            exit 1
          }
          Write-Host "OK  $dll"
        }

        # MSVC runtime DLLs
        $runtimeDlls = @("vcruntime140.dll", "vcruntime140_1.dll", "msvcp140.dll", "concrt140.dll")
        foreach ($dll in $runtimeDlls) {
          if (!(Test-Path $dll)) {
            Write-Warning "$dll not found (may cause runtime failures)"
          } else {
            Write-Host "OK  $dll"
          }
        }

        # Tools directory
        if (!(Test-Path "tools")) {
          Write-Warning "tools/ directory not found"
        } else {
          Write-Host "OK  tools/"
        }

        # smartctl.exe (bundled for SMART diagnostics)
        if (!(Test-Path "tools/smartmontools/smartctl.exe")) {
          Write-Warning "tools/smartmontools/smartctl.exe not found - SMART diagnostics unavailable"
        } else {
          $smartVer = & .\tools\smartmontools\smartctl.exe --version 2>&1 | Select-Object -First 1
          Write-Host "OK  tools/smartmontools/smartctl.exe ($smartVer)"
        }

        # aria2c.exe (bundled for ISO downloads)
        if (!(Test-Path "tools/uup/aria2c.exe")) {
          Write-Error "FATAL: tools/uup/aria2c.exe not found - ISO downloads will be broken"
          exit 1
        } else {
          $aria2Ver = & .\tools\uup\aria2c.exe --version 2>&1 | Select-Object -First 1
          Write-Host "OK  tools/uup/aria2c.exe ($aria2Ver)"
        }

        # UUP Media Creator (bundled for UUP-to-ISO conversion)
        if (!(Test-Path "tools/uup/uupmc/UUPMediaConverter.exe")) {
          Write-Error "FATAL: tools/uup/uupmc/UUPMediaConverter.exe not found - UUP conversion will be broken"
          exit 1
        } else {
          Write-Host "OK  tools/uup/uupmc/UUPMediaConverter.exe"
        }
        if (!(Test-Path "tools/uup/uupmc/UUPDownload.exe")) {
          Write-Error "FATAL: tools/uup/uupmc/UUPDownload.exe not found - UUP downloads will be broken"
          exit 1
        } else {
          Write-Host "OK  tools/uup/uupmc/UUPDownload.exe"
        }

        # iperf3.exe (bundled for LAN bandwidth testing)
        if (!(Test-Path "tools/iperf3/iperf3.exe")) {
          Write-Warning "tools/iperf3/iperf3.exe not found - LAN bandwidth testing unavailable"
        } else {
          Write-Host "OK  tools/iperf3/iperf3.exe"
        }

        # Win32 MCP server (bundled for manifest-gated desktop automation)
        if (!(Test-Path "tools/mcp/win32-mcp-server/win32-mcp-server.exe")) {
          Write-Error "FATAL: tools/mcp/win32-mcp-server/win32-mcp-server.exe not found - app-control MCP automation unavailable"
          exit 1
        } else {
          $win32McpVer = & .\tools\mcp\win32-mcp-server\win32-mcp-server.exe --version 2>&1 | Select-Object -First 1
          Write-Host "OK  tools/mcp/win32-mcp-server/win32-mcp-server.exe ($win32McpVer)"
        }
        if (Test-Path "tools/mcp/_build") {
          Write-Error "FATAL: tools/mcp/_build leaked into release output"
          exit 1
        }

        # Portable provider/app manifests
        if (!(Test-Path "data/ai/providers/providers.json")) {
          Write-Error "FATAL: data/ai/providers/providers.json not found"
          exit 1
        }
        if (!(Test-Path "data/ai/app_manifests/superantispyware.json")) {
          Write-Error "FATAL: data/ai/app_manifests/superantispyware.json not found"
          exit 1
        }
        if (!(Test-Path "data/ai/app_manifests/windows_sfc.json")) {
          Write-Error "FATAL: data/ai/app_manifests/windows_sfc.json not found"
          exit 1
        }
        if (Get-ChildItem "data/ai/providers" -Recurse -Filter "*.local.json" -ErrorAction SilentlyContinue) {
          Write-Error "FATAL: local provider config present in CI build output"
          exit 1
        }

        # Imported non-system DLLs must exist in the build output.
        & ../../scripts/verify_windows_runtime_dependencies.ps1 -RootDir . -PrimaryExe "sak_utility.exe"

        Write-Host ""
        Write-Host "=== Verification complete ==="

    - name: Run Tests
      shell: pwsh
      run: |
        ctest --test-dir build -C $env:BUILD_TYPE --output-on-failure

    - name: Package Application
      shell: pwsh
      run: |
        $pkgName = "SAK-Utility-v$env:APP_VERSION"
        & scripts/stage_portable_release.ps1 `
          -BuildDir "build/Release" `
          -PackageName $pkgName
        & scripts/create_release_archive.ps1 `
          -BuildDir "build/Release" `
          -PackageName $pkgName

    - name: Smoke test clean portable package
      working-directory: build/Release
      shell: pwsh
      run: |
        $pkgName = "SAK-Utility-v$env:APP_VERSION"
        $zipName = "$pkgName-Windows-x64.zip"
        $extract = Join-Path (Get-Location) "clean-smoke-extract"
        Remove-Item -Recurse -Force $extract -ErrorAction SilentlyContinue
        New-Item -ItemType Directory -Force -Path $extract | Out-Null
        Expand-Archive -LiteralPath $zipName -DestinationPath $extract -Force
        & "../../scripts/verify_portable_release_smoke.ps1" `
          -PackageRoot $extract `
          -RepoRoot (Resolve-Path "../..").Path

    - name: Startup E2E smoke from clean extracted package
      shell: pwsh
      run: |
        & scripts/run_portable_e2e_smoke.ps1 -PackageRoot "build/Release/clean-smoke-extract"

    - name: Release readiness gate from clean extracted package
      shell: pwsh
      run: |
        $pkgName = "SAK-Utility-v$env:APP_VERSION"
        $zipName = "$pkgName-Windows-x64.zip"
        $extract = "build/Release/clean-readiness-extract"
        Remove-Item -Recurse -Force $extract -ErrorAction SilentlyContinue
        New-Item -ItemType Directory -Force -Path $extract | Out-Null
        Expand-Archive -LiteralPath "build/Release/$zipName" -DestinationPath $extract -Force
        & scripts/check_release_readiness.ps1 -PackageRoot $extract

    - name: Create signing catalog
      if: github.event_name != 'pull_request'
      working-directory: build/Release
      shell: pwsh
      run: |
        $pkgName = "SAK-Utility-v$env:APP_VERSION"
        & "../../scripts/create_signing_catalog.ps1" `
          -RootDir $pkgName `
          -OutputPath "$pkgName/signing-catalog.txt"

    - name: Sign Packaged Binaries
      if: github.event_name != 'pull_request'
      uses: azure/artifact-signing-action@v2
      with:
        azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
        azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
        endpoint: https://wus.codesigning.azure.net/
        signing-account-name: scnetsolutions
        certificate-profile-name: SAKUtility
        files-catalog: build/Release/SAK-Utility-v${{ steps.version.outputs.version }}/signing-catalog.txt
        file-digest: SHA256
        timestamp-rfc3161: http://timestamp.acs.microsoft.com
        timestamp-digest: SHA256
        timeout: 900
        batch-size: 0

    - name: Verify Packaged Signatures
      if: github.event_name != 'pull_request'
      shell: pwsh
      run: |
        & scripts/verify_authenticode_signatures.ps1 `
          -RootDir "build/Release/SAK-Utility-v${{ steps.version.outputs.version }}"

    - name: Signed release readiness gate
      if: github.event_name != 'pull_request'
      shell: pwsh
      run: |
        & scripts/check_release_readiness.ps1 `
          -PackageRoot "build/Release/SAK-Utility-v${{ steps.version.outputs.version }}" `
          -RequireSignedPackage

    - name: Rebuild signed release archive
      working-directory: build/Release
      shell: pwsh
      run: |
        $pkgName = "SAK-Utility-v$env:APP_VERSION"
        & "../../scripts/create_release_archive.ps1" `
          -BuildDir . `
          -PackageName $pkgName `
          -CleanMutableRuntimeData

    - name: Create stable download alias
      if: startsWith(github.ref, 'refs/tags/v')
      shell: pwsh
      run: |
        $versionedZip = "build/Release/SAK-Utility-v${{ steps.version.outputs.version }}-Windows-x64.zip"
        $stableZip = "build/Release/SAK-Utility-Windows-x64.zip"
        Copy-Item -LiteralPath $versionedZip -Destination $stableZip -Force
        $stableHash = (Get-FileHash -LiteralPath $stableZip -Algorithm SHA256).Hash
        Add-Content -LiteralPath "build/Release/SHA256SUMS.txt" `
          -Value "SAK-Utility-Windows-x64.zip:  $stableHash"

    - name: Upload ZIP artifact
      uses: actions/upload-artifact@v7
      with:
        name: SAK-Utility-Windows-x64
        path: build/Release/SAK-Utility-v${{ steps.version.outputs.version }}/*
        retention-days: 90

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v3
      with:
        files: |
          build/Release/SAK-Utility-v${{ steps.version.outputs.version }}-Windows-x64.zip
          build/Release/SAK-Utility-Windows-x64.zip
          build/Release/SHA256SUMS.txt
        body: |
          # S.A.K. Utility v${{ steps.version.outputs.version }}

          **Swiss Army Knife Utility** - a portable Windows toolkit for PC technicians, IT pros, and sysadmins. Release artifacts are installer-free ZIP packages that include the app, Qt runtime files, plugins, and bundled technician tools.

          ### AI Assistant
          Codex-style technician chat workspace with prompt/result transcript, custom chat sessions, prompt history, context chips, Markdown instruction attachments, token usage status, and generated reports. Uses a user-supplied OpenAI API key stored encrypted under the portable app data directory.

          **Local PC actions** - PowerShell, cmd.exe, direct process launch, screenshots, HTTPS downloads, SAK package manager actions, and SAK offline downloader actions. Risky or destructive operations use approval gates and restore-point prompts when rollback may be needed.

          **Multi-agent workflows** - Overseer-led workflow execution with specialized subagents, shared session memory, phase progress, cancellation, recovery policy, verification, cleanup, artifacts, and human handoff. Built-in workflows cover full PC health checks, drive diagnostics, Windows Update repair, network repair, BSOD investigation, printer troubleshooting, startup performance triage, malware and virus removal, bloatware/adware cleanup, clean uninstall, app install, offline installer download, offline deployment bundles, technician tool-assisted tasks, and service reports.

          ### Backup and Restore
          Step-by-step user profile backup and restore wizards. Smart category filtering (Documents, Desktop, AppData, browser profiles, etc.), AES-256 encryption, NTFS permission and timestamp preservation, and compressed ZIP output. Integrated quick tools: Screenshot Settings capture and BitLocker Key Backup.

          ### Application Management
          **App Installation** - Scan installed programs on the current machine, match them to Chocolatey packages, and bulk-install on a new PC with a single click. Export/import application lists as JSON.
          **Advanced Uninstall** - Deep application removal for Win32, UWP, and provisioned apps. Three-level leftover scanner (safe/moderate/advanced), registry snapshot engine for pre/post uninstall diffs, batch uninstall queue, and Recycle Bin support with locked-file reboot scheduling.

          ### Benchmark and Diagnostics
          **Diagnostics** - SMART disk health analysis, system info collection, and HTML/JSON/CSV report export with technician metadata.
          **Benchmarks** - CPU, disk (sequential and random I/O), and memory throughput benchmarks. Stress testing with thermal monitoring, configurable duration, and per-core thread control.

          ### Image Flasher
          Flash ISO/IMG files to USB drives with partition-level writing. Built-in Windows ISO downloader (via UUP Dump API with UUP-to-ISO conversion pipeline) and Linux distro catalog with direct download links.

          ### File Management
          **File Organizer** - Sort files into folders by extension using customizable category rules. Collision handling (skip, rename, overwrite), undo support, and dry-run preview.
          **Duplicate Finder** - Parallel file hashing (MD5/SHA-256) with size pre-filter. Group duplicates by hash, select which to keep, and delete or move the rest.
          **Advanced Search** - Grep-style content search with regex, glob filters, and file metadata constraints (size, date, attributes). Binary/hex mode, archive search (ZIP/EPUB/DOCX/XLSX), preview pane with match highlighting, and search history.

          ### Network Management
          **Network Diagnostics** - 10-tool suite: Ping, Traceroute, MTR, DNS Lookup, Port Scanner, Bandwidth (iPerf3 + HTTP), WiFi Analyzer, Active Connections, Firewall Auditor, and Network Share Browser. HTML and JSON report generation.
          **Network Adapters** - Adapter inspector with full IPv4/IPv6 config, DHCP, DNS, driver info, and traffic stats. Ethernet settings backup/restore to portable JSON for cross-machine portability.
          **WiFi Manager** - WiFi credential manager with QR code generation for phone/tablet connection. Batch QR export (PNG/PDF/JPG/BMP), Windows `.cmd` script generation, macOS `.mobileconfig` profile export, and Windows known-profile scanning.

          ### Email Tools
          **Email Inspector** - Browse, search, and export data from Outlook PST/OST and MBOX archives - no Outlook or MAPI required. Folder tree navigation, sortable item list, HTML/plain-text preview, MAPI property inspector. Contacts dialog with VCF/CSV export, calendar dialog (month/week/day views) with ICS/CSV export, and attachments browser with batch extraction. Full-text search across subjects, bodies, senders, recipients, and attachment names. Email profile manager with orphaned file discovery.
          **OST Converter** - Multi-threaded bulk OST/PST conversion to 8 output formats (PST, EML, MSG, MBOX, DBX, HTML, PDF, IMAP Upload) with deleted item recovery, PST splitting, IMAP cloud upload, and advanced filtering.

          ### Settings
          Per-panel settings - each panel provides its own configuration (backup location, uninstall defaults, scan levels, flash options, etc.).

          ---

          Portable ZIP. Open source. No telemetry.

          **Requirements:** Windows 10/11 x64 - Runs as standard user; elevates per-task via UAC when needed

          See the [README](https://github.com/${{ github.repository }}/blob/main/README.md) for detailed documentation and screenshots.
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-info:
    name: Build Information
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Display Build Info
      run: |
        VERSION=$(cat VERSION | tr -d '[:space:]')
        CMAKE_VERSION=$(cmake --version | head -n 1 | sed 's/^cmake version //')
        echo "### Build Information" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- **Version**: $VERSION" >> $GITHUB_STEP_SUMMARY
        echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Qt Version**: ${{ env.QT_VERSION }}" >> $GITHUB_STEP_SUMMARY
        echo "- **CMake Version**: $CMAKE_VERSION" >> $GITHUB_STEP_SUMMARY
        echo "- **Build Type**: ${{ env.BUILD_TYPE }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Recent Changes" >> $GITHUB_STEP_SUMMARY
        git log --oneline -10 >> $GITHUB_STEP_SUMMARY
