name: Bug Report
description: Report a bug or issue with S.A.K. Utility
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the form below so we can investigate.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear description of what went wrong.
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the issue.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
      placeholder: Describe what should happen...
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened.
      placeholder: Describe what happened instead...
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: S.A.K. Utility Version
      description: The version of S.A.K. Utility you're using (shown in About tab).
      placeholder: "e.g. 0.8.8"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      description: Your Windows version.
      placeholder: "e.g. Windows 11 24H2"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Log Output
      description: Paste any relevant log output from the S.A.K. log window.
      render: shell
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain the problem.
    validations:
      required: false
