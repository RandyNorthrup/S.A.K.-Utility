# =============================================================================
# S.A.K. Utility - Pre-commit Hook Configuration
# Strictest settings: every check must pass, zero tolerance for violations.
#
# Install:  pre-commit install --install-hooks
# Run all:  pre-commit run --all-files
# Update:   pre-commit autoupdate
# =============================================================================

default_language_version:
  python: python3

# Fail fast: stop on first hook failure (strictest)
fail_fast: true

repos:
  # =========================================================================
  # Standard pre-commit hooks (fast, universal checks)
  # =========================================================================
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: [--maxkb=4096]
      - id: check-merge-conflict
      - id: check-case-conflict

  # =========================================================================
  # Local hooks - security and C++ static analysis (strictest settings)
  # =========================================================================
  - repo: local
    hooks:
      # -------------------------------------------------------------------
      # 1. Secret/path scan - no key-shaped literals or developer paths
      # -------------------------------------------------------------------
      - id: secret-path-scan
        name: "Secret/path scan"
        description: "Reject key-shaped literals and hardcoded developer-machine paths"
        entry: powershell.exe -NoProfile -NonInteractive -ExecutionPolicy Bypass
          -File scripts/scan_secrets.ps1 -SkipExternalTools
        language: system
        pass_filenames: false

      # -------------------------------------------------------------------
      # 2. Qt resource manifest check - every qrc file path must exist
      # -------------------------------------------------------------------
      - id: qrc-resource-check
        name: "Qt resource manifest check"
        description: "Reject .qrc manifests that reference missing files"
        entry: powershell.exe -NoProfile -NonInteractive -ExecutionPolicy Bypass
          -File scripts/check_qrc_resources.ps1
        language: system
        pass_filenames: false

      # -------------------------------------------------------------------
      # 3. clang-format - zero formatting deviations allowed
      # -------------------------------------------------------------------
      - id: clang-format
        name: "clang-format (strict)"
        description: "Enforce .clang-format style on all C++ files"
        entry: powershell.exe -NoProfile -NonInteractive -Command
          "& 'C:/Program Files/Microsoft Visual Studio/2022/Community/VC/Tools/Llvm/bin/clang-format.exe' --dry-run -Werror --"
        language: system
        types_or: [c, c++]
        files: \.(cpp|h|hpp|cxx|cc|hxx)$
        exclude: (third_party|3rdparty|external|_archived)/

      # -------------------------------------------------------------------
      # 4. Lizard - cyclomatic complexity and function metrics
      #    CCN <= 10, length <= 70, params <= 5
      # -------------------------------------------------------------------
      - id: lizard-complexity
        name: "Lizard complexity (strict)"
        description: "CCN <=10, function length <=70, parameters <=5"
        entry: python scripts/run_lizard.py
        language: system
        types_or: [c, c++]
        files: \.(cpp|h|hpp|cxx|cc|hxx)$
        exclude: (third_party|3rdparty|external|_archived)/

      # -------------------------------------------------------------------
      # 5. cppcheck - deep static analysis
      #    All checks, exhaustive level, inconclusive, C++23
      # -------------------------------------------------------------------
      - id: cppcheck
        name: "cppcheck (exhaustive)"
        description: "Static analysis: all checks enabled, exhaustive depth, C++23"
        entry: powershell.exe -NoProfile -NonInteractive -ExecutionPolicy Bypass
          -File scripts/run_cppcheck.ps1 -Files
        language: system
        types_or: [c, c++]
        files: \.(cpp|h|hpp|cxx|cc|hxx)$
        exclude: (third_party|3rdparty|external|_archived)/
